<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#5b5cff"/>
      <stop offset="1" stop-color="#2a1f8a"/>
    </linearGradient>
    <linearGradient id="page" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffdf3"/>
      <stop offset="1" stop-color="#ede5c8"/>
    </linearGradient>
    <linearGradient id="spine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1466"/>
      <stop offset="1" stop-color="#100a40"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="14"/>
      <feOffset dx="0" dy="14" result="o"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.45"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- macOS squircle background -->
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#bg)"/>

  <!-- Subtle vignette -->
  <radialGradient id="vig" cx="0.5" cy="0.45" r="0.75">
    <stop offset="0.55" stop-color="#000" stop-opacity="0"/>
    <stop offset="1" stop-color="#000" stop-opacity="0.25"/>
  </radialGradient>
  <rect x="0" y="0" width="1024" height="1024" rx="230" ry="230" fill="url(#vig)"/>

  <!-- Open book -->
  <g transform="translate(512 560)" filter="url(#shadow)">
    <!-- Soft ground shadow under book -->
    <ellipse cx="0" cy="270" rx="360" ry="22" fill="#000" opacity="0.35"/>

    <!-- Left page -->
    <path d="M-340,-230
             C -260,-260 -90,-250 -20,-220
             L -20,230
             C -90,200 -260,210 -340,240
             Z"
          fill="url(#page)" stroke="#bcae7a" stroke-width="3"/>

    <!-- Right page -->
    <path d="M340,-230
             C 260,-260 90,-250 20,-220
             L 20,230
             C 90,200 260,210 340,240
             Z"
          fill="url(#page)" stroke="#bcae7a" stroke-width="3"/>

    <!-- Spine -->
    <path d="M-20,-220 L-20,230 L20,230 L20,-220 Z" fill="url(#spine)"/>
    <line x1="0" y1="-220" x2="0" y2="230" stroke="#000" stroke-opacity="0.35" stroke-width="2"/>

    <!-- Text lines, left page -->
    <g stroke="#a0976d" stroke-width="9" stroke-linecap="round">
      <line x1="-300" y1="-170" x2="-60" y2="-160"/>
      <line x1="-300" y1="-120" x2="-70" y2="-110"/>
      <line x1="-300" y1="-70" x2="-50" y2="-62"/>
      <line x1="-300" y1="-20" x2="-100" y2="-12"/>
      <line x1="-300" y1="30" x2="-60" y2="40"/>
      <line x1="-300" y1="80" x2="-80" y2="90"/>
      <line x1="-300" y1="130" x2="-50" y2="140"/>
      <line x1="-300" y1="180" x2="-130" y2="188"/>
    </g>

    <!-- Text lines, right page -->
    <g stroke="#a0976d" stroke-width="9" stroke-linecap="round">
      <line x1="60" y1="-160" x2="300" y2="-170"/>
      <line x1="70" y1="-110" x2="300" y2="-120"/>
      <line x1="50" y1="-62" x2="190" y2="-70"/>
    </g>
    <!-- Highlighted "word" -->
    <rect x="200" y="-82" width="100" height="34" rx="6" fill="#ffd60a" opacity="0.92"/>
    <line x1="210" y1="-65" x2="290" y2="-69" stroke="#6b5a18" stroke-width="9" stroke-linecap="round"/>
    <g stroke="#a0976d" stroke-width="9" stroke-linecap="round">
      <line x1="50" y1="-12" x2="300" y2="-20"/>
      <line x1="50" y1="40" x2="280" y2="30"/>
      <line x1="50" y1="90" x2="300" y2="80"/>
      <line x1="50" y1="140" x2="240" y2="130"/>
      <line x1="50" y1="188" x2="270" y2="180"/>
    </g>
  </g>
</svg>
